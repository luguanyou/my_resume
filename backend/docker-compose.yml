services:
  api:
    build: .
    container_name: portfolio_api
    ports:
      - "8000:8000"

    # 从 .env 文件注入环境变量（API Key 等敏感信息不写在这里）
    env_file:
      - .env

    # 覆盖数据存储路径，指向容器内的持久化目录
    environment:
      - DATABASE_URL=sqlite:////app/db/resume.db
      - CHROMA_PERSIST_DIR=/app/chroma_db
      - KNOWLEDGE_FILE=/app/resume_knowledge.md
      - HF_ENDPOINT=https://hf-mirror.com

    volumes:
      # ① SQLite 数据库持久化（容器重启数据不丢失）
      - db_data:/app/db

      # ② ChromaDB 向量库持久化（避免每次重启重新向量化）
      - chroma_data:/app/chroma_db

      # ③ 简历知识库文件：绑定本地文件，修改后调接口即可热更新
      #    无需重建镜像
      - ./resume_knowledge.md:/app/resume_knowledge.md

      # ④ 简历结构化数据：绑定本地目录，修改后删库重启即可更新
      - ./data:/app/data

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

# 命名 volume，数据存储在 Docker 管理的目录中（不依赖宿主机路径）
volumes:
  db_data:
  chroma_data:
