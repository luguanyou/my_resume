services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
      args:
        - HTTP_PROXY=http://host.docker.internal:7890
        - HTTPS_PROXY=http://host.docker.internal:7890
      extra_hosts:
        - "host.docker.internal:host-gateway"
    container_name: resume_backend
    ports:
      - "9915:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=sqlite:////app/db/resume.db
      - CHROMA_PERSIST_DIR=/app/chroma_db
      - KNOWLEDGE_FILE=/app/resume_knowledge.md
      # 优化1：配置国内镜像加速模型下载
      - HF_ENDPOINT=https://hf-mirror.com
      - TRANSFORMERS_CACHE=/app/model_cache/huggingface
      - SENTENCE_TRANSFORMERS_HOME=/app/model_cache/sentence_transformers
    volumes:
      - db_data:/app/db
      - chroma_data:/app/chroma_db
      - ./backend/resume_knowledge.md:/app/resume_knowledge.md
      - ./backend/data:/app/data
      # 优化2：将模型缓存目录挂载到宿主机，避免容器销毁后重复下载大模型
      - model_cache:/app/model_cache
    restart: unless-stopped
    networks:
      - resume_net
    healthcheck:
      test: ["CMD", "python", "-c", "import http.client; conn = http.client.HTTPConnection('localhost', 8000); conn.request('GET', '/myresume/api/health'); res = conn.getresponse(); exit(0) if res.status == 200 else exit(1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_BASE_URL: http://backend:8000
    container_name: resume_frontend
    ports:
      - "9950:3000"
    environment:
      NODE_ENV: production
      API_BASE_URL: http://backend:8000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:9915
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - resume_net

networks:
  resume_net:
    driver: bridge

volumes:
  db_data:
  chroma_data:
  model_cache: # 新增：用于持久化大模型文件的命名卷
